# ─────────────────────────────────────────────────────────────────────────────
#  KavachX / BASCG  —  Production Nginx Configuration
#  Tested with nginx ≥ 1.24 (Ubuntu 22.04 LTS / Debian 12)
#
#  TLS termination:  Let's Encrypt / certbot (auto-renew via certbot timer)
#  Upstream:         FastAPI/Uvicorn on 127.0.0.1:8001
#  Frontend:         Static Vite build at /var/www/kavachx/dist
#  WebSocket:        /api/v1/ws    (BASCG real-time governance stream)
#  Prometheus:       /metrics      restricted to internal network (127.0.0.1/10.x)
#
#  Quick-start:
#    sudo apt install nginx certbot python3-certbot-nginx
#    sudo certbot --nginx -d kavachx.yourdomain.in
#    sudo cp nginx.conf /etc/nginx/sites-available/kavachx
#    sudo ln -s /etc/nginx/sites-available/kavachx /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate-limit zones ─────────────────────────────────────────────────────────
# api_limit   — general API requests: 20 r/s burst 40, restrict brute-force
# login_limit — auth endpoints: 5 r/s burst 10 (extra protection)
# ws_limit    — WebSocket upgrades: 5 r/s burst 10
# partner_limit — DPDP partner endpoints: 30 r/s burst 60 (generous for SDK)
limit_req_zone  $binary_remote_addr  zone=api_limit:16m      rate=20r/s;
limit_req_zone  $binary_remote_addr  zone=login_limit:4m     rate=5r/s;
limit_req_zone  $binary_remote_addr  zone=ws_limit:4m        rate=5r/s;
limit_req_zone  $binary_remote_addr  zone=partner_limit:16m  rate=30r/s;

# ── Connection-count limit ────────────────────────────────────────────────────
limit_conn_zone $binary_remote_addr  zone=conn_limit:16m;

# ── Upstream — FastAPI/Uvicorn ────────────────────────────────────────────────
upstream kavachx_backend {
    server 127.0.0.1:8001;
    keepalive 64;                  # keep connections warm for high-throughput
}

# ── Shared proxy params ───────────────────────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─────────────────────────────────────────────────────────────────────────────
#  HTTP → HTTPS redirect
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt ACME challenge (certbot places files here)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
#  HTTPS — primary server block
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kavachx.yourdomain.in;         # ← replace with your domain

    # ── TLS (certbot / Let's Encrypt — adjust paths as needed) ───────────────
    ssl_certificate     /etc/letsencrypt/live/kavachx.yourdomain.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kavachx.yourdomain.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/kavachx.yourdomain.in/chain.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling — removes client round-trip to CA
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers (complement FastAPI SecurityHeadersMiddleware) ────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;
    # Content-Security-Policy — tighten after frontend audit
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: https:; frame-ancestors 'none'" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/kavachx_access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/kavachx_error.log  warn;

    # ── Connection limits ─────────────────────────────────────────────────────
    limit_conn conn_limit 100;

    # ── Request size ──────────────────────────────────────────────────────────
    # Sync with MAX_REQUEST_SIZE_KB in .env (default 512 KB)
    client_max_body_size   2m;   # slightly higher than app limit for multipart
    client_body_timeout    30s;
    client_header_timeout  10s;
    send_timeout           60s;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_types        text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_comp_level   4;
    gzip_min_length   1024;
    gzip_vary         on;
    gzip_proxied      any;

    # ── Proxy defaults ────────────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Request-ID      $request_id;   # propagate nginx request ID
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_buffering    on;
    proxy_buffer_size  8k;
    proxy_buffers      16 8k;

    # ─────────────────────────────────────────────────────────────────────────
    #  /metrics  — Prometheus exposition (INTERNAL ONLY)
    #  Restrict to monitoring CIDR. Never expose to the public internet.
    # ─────────────────────────────────────────────────────────────────────────
    location = /metrics {
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;        # private datacenter / VPC
        allow 172.16.0.0/12;     # Docker / Kubernetes internal
        deny  all;

        proxy_pass http://kavachx_backend;
        proxy_set_header Connection "";   # keepalive
    }

    # ─────────────────────────────────────────────────────────────────────────
    #  /ready  — Kubernetes readiness probe (public — 200 / 503 only)
    # ─────────────────────────────────────────────────────────────────────────
    location = /ready {
        proxy_pass http://kavachx_backend;
        proxy_set_header Connection "";
        access_log off;           # don't clutter access logs with probe noise
    }

    location = /health {
        proxy_pass http://kavachx_backend;
        proxy_set_header Connection "";
        access_log off;
    }

    # ─────────────────────────────────────────────────────────────────────────
    #  /api/v1/ws  — WebSocket (BASCG governance stream)
    # ─────────────────────────────────────────────────────────────────────────
    location /api/v1/ws {
        limit_req zone=ws_limit burst=10 nodelay;

        proxy_pass http://kavachx_backend;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # WebSocket-specific timeouts — keep alive up to 3 min of silence
        proxy_read_timeout  180s;
        proxy_send_timeout  180s;
    }

    # ─────────────────────────────────────────────────────────────────────────
    #  /api/v1/auth/*  — login / token refresh (strict rate limit)
    # ─────────────────────────────────────────────────────────────────────────
    location ~ ^/api/v1/auth/ {
        limit_req zone=login_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://kavachx_backend;
        proxy_set_header Connection "";
    }

    # ─────────────────────────────────────────────────────────────────────────
    #  /api/v1/dpdp-moderator/*  — DPDP partner SDK endpoints
    #  Higher burst to accommodate batch moderation (50-item batches)
    # ─────────────────────────────────────────────────────────────────────────
    location ~ ^/api/v1/dpdp-moderator/ {
        limit_req zone=partner_limit burst=60 nodelay;
        limit_req_status 429;

        # Add CORS preflight passthrough for SDK clients on different origins
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  "$http_origin" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, X-API-Key, Content-Type, X-Request-ID" always;
            add_header Access-Control-Max-Age 3600;
            return 204;
        }

        proxy_pass http://kavachx_backend;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;    # batch of 50 may take longer
    }

    # ─────────────────────────────────────────────────────────────────────────
    #  /api/*  — all other API endpoints
    # ─────────────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        limit_req_status 429;

        proxy_pass http://kavachx_backend;
        proxy_set_header Connection "";
    }

    # ─────────────────────────────────────────────────────────────────────────
    #  Frontend — Vite SPA static build
    # ─────────────────────────────────────────────────────────────────────────
    root /var/www/kavachx/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively; HTML never cached
        location ~* \.(js|css|woff2?|ttf|svg|ico|png|jpg|webp|avif)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            access_log  off;
        }

        # index.html — no cache so SPA updates are picked up
        location = /index.html {
            add_header  Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    #  Block common scanners / bad actors early
    # ─────────────────────────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* (\.php|\.asp|\.aspx|\.cgi|\.env|\.git|wp-login\.php)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page 429 /errors/429.json;
    error_page 502 503 504 /errors/5xx.json;

    location /errors/ {
        internal;
        root /var/www/kavachx;
    }
}
